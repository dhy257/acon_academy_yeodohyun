<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
<script>
	function getFood() {
		//alert("dd");
		window.location.href = "/0422/food0";
	}
	function getFood2() {
		//alert("dd");

		// jquery -- ajax 사용하기 ( 외부라이브러리 )
		// $.ajax();
		$.ajax({
			type : "get",
			url : "/0422/food0",
			success : function(data) {
				console.log(data);
				//
				// document.getElementById("result").innerHTML = data;
				// jquery버전
				$("#result").html(data);
			},
			error : function(err) {
				// console.log(err);
				alert("요청에 실패했습니다.");
			}
		}

		);

	}
</script>
</head>
<body>
	<button onclick="getFood()">메뉴추천</button>
	<a href="/0422/food0">메뉴추천</a>

	<button onclick="getFood2()">메뉴추천 ajax</button>
	<div id="result">dddddd</div>
</body>
</html>
