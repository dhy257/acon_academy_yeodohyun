<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	
	
	<h2>GET/POST</h2>
	<p>
	GET 요청
	
	a태그, url주소줄에 직접입력, form태그에서 method="get"으로 요청하면
	브라우저가 get요청으로 만들어줌!! <br>
	서버에 간단한 정보의 데이터를 보낼 때 사용함 (주소줄에 노출됨), 데이터형식, 데이터길이 제한되어 있음
	
	</p>
	
	<a href="/0420/lotte.do">get요청</a>
	
	<form action="/0420/lotte.do" method="get">
	<button>전송1</button>
	</form>
	
	<p>POST요청</p>
	
	<form action="/0420/lotte.do" method="post">
	<button>전송2</button>
	</form>
</body>
</html>
